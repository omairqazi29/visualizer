# Performance matrix overlay — profile-gated extras; does NOT alter normal
# `docker compose up` (use this file only with -f and explicit profiles / runner).
#
# Design: one compose *project* per scenario (parallel via different -p names and
# non-conflicting host ports). Scenario knobs are env vars (see docs/PERF_MATRIX.md).
#
# Env vars (operator-facing — set per parallel stack):
#   API_HOST_PORT          Host port for API (default 8000)
#   FRONTEND_HOST_PORT     Host port for frontend (default 3000)
#   PERF_API_DELAY_MS      Artificial API latency in ms (default 0)
#   PERF_API_FAIL_PATHS    Comma-separated path prefixes → 503 (default empty)
#   PERF_PAGE_SET          all | heavy | light — hint for runner page subset
#   API_CPUS               CPU limit for api (e.g. 0.5) — cpu-throttle scenario
#   API_MEM_LIMIT          Memory limit for api (e.g. 256m) — mem-pressure
#   FRONTEND_CPUS          CPU limit for frontend
#   FRONTEND_MEM_LIMIT     Memory limit for frontend
#   NEXT_PUBLIC_API_URL    Browser-reachable API base (must include /api suffix)
#                          e.g. http://localhost:18000/api for host Playwright
#
# Profiles:
#   perf-matrix   — optional label; runner uses explicit service list
#   perf-runner   — Playwright metrics collector (one-shot)
#
# Examples (parallel stacks — different project names + ports):
#
#   # baseline
#   API_HOST_PORT=18000 FRONTEND_HOST_PORT=13000 \
#     NEXT_PUBLIC_API_URL=http://localhost:18000/api \
#     docker compose -p perf-baseline \
#       -f docker-compose.yml -f docker-compose.perf-matrix.yml \
#       up --build -d api frontend
#
#   # api-slow (2s delay on non-health routes)
#   API_HOST_PORT=18001 FRONTEND_HOST_PORT=13001 PERF_API_DELAY_MS=2000 \
#     NEXT_PUBLIC_API_URL=http://localhost:18001/api \
#     docker compose -p perf-api-slow \
#       -f docker-compose.yml -f docker-compose.perf-matrix.yml \
#       up --build -d api frontend
#
#   # cpu-throttle
#   API_HOST_PORT=18002 FRONTEND_HOST_PORT=13002 API_CPUS=0.5 FRONTEND_CPUS=0.5 \
#     NEXT_PUBLIC_API_URL=http://localhost:18002/api \
#     docker compose -p perf-cpu-throttle \
#       -f docker-compose.yml -f docker-compose.perf-matrix.yml \
#       up --build -d api frontend
#
#   # mem-pressure
#   API_HOST_PORT=18003 FRONTEND_HOST_PORT=13003 API_MEM_LIMIT=256m FRONTEND_MEM_LIMIT=384m \
#     NEXT_PUBLIC_API_URL=http://localhost:18003/api \
#     docker compose -p perf-mem-pressure \
#       -f docker-compose.yml -f docker-compose.perf-matrix.yml \
#       up --build -d api frontend
#
#   # api-paused — frontend only (backend unreachable; no silent HTTP fallbacks)
#   FRONTEND_HOST_PORT=13004 NEXT_PUBLIC_API_URL=http://localhost:18999/api \
#     docker compose -p perf-api-paused \
#       -f docker-compose.yml -f docker-compose.perf-matrix.yml \
#       up --build -d frontend
#
# Or run the full matrix via:
#   python3 scripts/perf_matrix.py
#   python3 scripts/perf_matrix.py --scenarios baseline,api-slow --keep-alive

services:
  api:
    # Ports come from docker-compose.yml (${API_HOST_PORT:-8000}) — do not redeclare
    # here or Compose merges duplicate host binds.
    environment:
      - PYTHONUNBUFFERED=1
      - PERF_API_DELAY_MS=${PERF_API_DELAY_MS:-0}
      - PERF_API_FAIL_PATHS=${PERF_API_FAIL_PATHS:-}
      - PERF_PAGE_SET=${PERF_PAGE_SET:-all}
    # High defaults ≈ no throttle; set API_CPUS=0.5 / API_MEM_LIMIT=256m per scenario.
    # Cap at host CPU count (Docker errors if cpus > available, e.g. >10 on this machine).
    cpus: ${API_CPUS:-8.0}
    mem_limit: ${API_MEM_LIMIT:-8g}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser on host talks to published API_HOST_PORT (not the docker network name).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
        REQUIRE_API_URL: "1"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      - REQUIRE_API_URL=1
      - NODE_ENV=production
      - PERF_PAGE_SET=${PERF_PAGE_SET:-all}
    cpus: ${FRONTEND_CPUS:-8.0}
    mem_limit: ${FRONTEND_MEM_LIMIT:-8g}
    # Image-baked build must not be shadowed by host bind mounts from base compose.
    # Compose Spec !reset clears merged sequence fields (requires Compose v2.24+).
    volumes: !reset []
    # Do not depend_on api here — api-paused scenario starts frontend alone.
    depends_on: !reset []

  # One-shot Playwright metrics runner (optional; host-side script is preferred for parallel stacks).
  perf-runner:
    profiles: ["perf-runner"]
    build:
      context: .
      dockerfile: scripts/perf_runner.Dockerfile
    working_dir: /app
    volumes:
      - .:/app
      - ./artifacts/perf-matrix:/app/artifacts/perf-matrix
    environment:
      - PYTHONUNBUFFERED=1
      - PERF_FRONTEND_URL=${PERF_FRONTEND_URL:-http://frontend:3000}
      - PERF_API_URL=${PERF_API_URL:-http://api:8000}
      - PERF_PAGE_SET=${PERF_PAGE_SET:-all}
      - PERF_SCENARIO=${PERF_SCENARIO:-in-compose}
      - PERF_ARTIFACT_DIR=/app/artifacts/perf-matrix
    entrypoint: ["python3", "scripts/perf_matrix.py"]
    command:
      - "--host-mode"
      - "--frontend-url"
      - "http://frontend:3000"
      - "--api-url"
      - "http://api:8000"
      - "--scenarios"
      - "in-compose"
      - "--skip-compose"
      - "--no-teardown"

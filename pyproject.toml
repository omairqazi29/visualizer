[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-fail-under=80",
    "--strict-markers",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.coverage.run]
source = ["src"]
omit = [
    "src/scripts/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.",
]
fail_under = 80
show_missing = true

[tool.hypothesis]
# Default profile: balanced speed/thoroughness
[tool.hypothesis.profiles.default]
max_examples = 50

[tool.hypothesis.profiles.ci]
max_examples = 200

[tool.hypothesis.profiles.dev]
max_examples = 10

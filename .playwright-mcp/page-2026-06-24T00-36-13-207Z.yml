            - heading "Monthly Immigrant Visa Issuance Statistics" [level=1] [ref=e126]
          - generic [ref=e127]:
            - generic [ref=e129]:
              - paragraph
              - paragraph [ref=e130]: The reports below contain preliminary data which are subject to change.
              - paragraph [ref=e131]: The Visa Office has changed its methodology for calculating visa data beginning with the Fiscal Year (FY) 2019 annual Report of the Visa Office and continuing with FY 2020 data, to reflect the greater access to application-level data attained during FY 2019. Our previous methodology was based on a count of workload actions, which were not linked by application. The new methodology more accurately reflects final outcomes from the visa application process during a specified reporting period. The new methodology follows visa applications, including updates to their status (i.e., issued or refused), which could change as the fiscal year progresses, or result in slight changes in data for earlier years. Therefore, beginning with FY 2020, individual monthly issuance reports should not be aggregated, as this will not provide an accurate issuance total for the fiscal year to date. Instead, refer to our annual Report of the Visa Office for final full Fiscal Year statistics.
              - paragraph [ref=e132]: While the new methodology is more accurate, it does not mean that our prior methodology was flawed. The two are simply not comparable. However, based on our analysis, the discrepancies between the methodologies are minor. For example, the difference between reported issuances of NIVs and IVs in FY 2018 (legacy methodology) and those in FY 2019 (new methodology) is less than one percent worldwide.
              - paragraph [ref=e133]: Please note that the new methodology is only being applied to the monthly IV issuance reports below, beginning with the December 2019 reports.
              - paragraph [ref=e134]: Beginning with February 2021, the format of the Immigrant Visa data being reported will be updated to reflect the more commonly used and recognized general visa categories, which are the same as published in the annual Report of the Visa Office.
              - paragraph
